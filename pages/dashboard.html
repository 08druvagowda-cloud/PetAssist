<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — PetAssist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/store.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <i class="fas fa-paw"></i>
                <span>PetAssist</span>
            </a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span class="hamburger"></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="/" class="nav-link"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="/pages/dashboard" class="nav-link active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="/pages/pets" class="nav-link"><i class="fas fa-dog"></i> My Pets</a></li>
                <li><a href="/pages/care-center" class="nav-link"><i class="fas fa-hands-helping"></i> Care Center</a></li>
                <li><a href="/pages/guide" class="nav-link"><i class="fas fa-book"></i> Guide</a></li>
                <li class="nav-user-section">
                    <a href="javascript:void(0)" onclick="Store.logout()" class="nav-link nav-logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container" id="app-content">
        <div class="page-header" style="text-align: left;">
            <h1 id="welcome-msg">Dashboard</h1>
            <p>Welcome back! Here's an overview of your pets.</p>
            <script>
                document.getElementById('welcome-msg').innerText = "Dashboard — " + Store.getCurrentUser().name;
            </script>
        </div>

        <div class="admin-stats mb-32" id="stats-container">
            <div class="admin-stat-card">
                <div class="stat-number text-primary" id="stat-pets">0</div>
                <div class="stat-label">Total Pets</div>
            </div>
            <div class="admin-stat-card">
                <div class="stat-number text-warning" id="stat-appts">0</div>
                <div class="stat-label">Pending Appointments</div>
            </div>
            <div class="admin-stat-card">
                <div class="stat-number text-success" id="stat-vaccs">0</div>
                <div class="stat-label">Vaccinations Logged</div>
            </div>
        </div>

        <div class="grid-2">
            <div class="glass-card-static">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3 class="section-title" style="margin:0;"><i class="fas fa-dog"></i> Pet Quick View</h3>
                    <a href="/pages/pets" class="btn btn-sm btn-secondary">Manage</a>
                </div>
                <div id="pets-list">
                    <!-- Loaded via JS -->
                </div>
            </div>

            <div class="glass-card-static">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3 class="section-title" style="margin:0;"><i class="fas fa-syringe"></i> Upcoming Tasks</h3>
                </div>
                <div class="empty-state">
                    <i class="fas fa-check-circle"></i>
                    <p>All tasks are caught up (Mock Data Demo).</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        // Load data to dashboard
        const pets = Store.getAll('pets');
        const appts = Store.getAll('appointments').filter(a => a.status === 'Pending');
        const vaccs = Store.getAll('vaccinations');

        document.getElementById('stat-pets').innerText = pets.length;
        document.getElementById('stat-appts').innerText = appts.length;
        document.getElementById('stat-vaccs').innerText = vaccs.length;

        const pList = document.getElementById('pets-list');
        if (pets.length === 0) {
            pList.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-paw"></i>
                    <p>You haven't added any pets yet.</p>
                    <a href="/pages/pets" class="btn btn-primary"><i class="fas fa-plus"></i> Add Pet</a>
                </div>`;
        } else {
            pets.forEach(p => {
                 pList.innerHTML += `
                 <div style="display:flex; align-items:center; gap:16px; margin-bottom:16px; padding:12px; background:var(--glass-surface); border-radius:var(--radius-sm); border:1px solid rgba(255,255,255,0.05);">
                    <div style="width:50px; height:50px; border-radius:50%; background:var(--primary-dark); display:flex; align-items:center; justify-content:center; font-size:1.5rem;">
                        🐾
                    </div>
                    <div>
                        <h4 style="margin:0;">${p.pet_name}</h4>
                        <span style="font-size:0.8rem; color:var(--text-muted);">${p.species} • ${p.breed}</span>
                    </div>
                 </div>`;
            });
        }
    </script>
</body>
</html>
