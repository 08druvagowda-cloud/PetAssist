<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pets — PetAssist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/store.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <i class="fas fa-paw"></i>
                <span>PetAssist</span>
            </a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span class="hamburger"></span>
            </button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="/" class="nav-link"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="/pages/dashboard" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="/pages/pets" class="nav-link active"><i class="fas fa-dog"></i> My Pets</a></li>
                <li><a href="/pages/care-center" class="nav-link"><i class="fas fa-hands-helping"></i> Care Center</a></li>
                <li><a href="/pages/guide" class="nav-link"><i class="fas fa-book"></i> Guide</a></li>
                <li class="nav-user-section">
                    <a href="javascript:void(0)" onclick="Store.logout()" class="nav-link nav-logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header" style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div>
                <h1>Manage Pets</h1>
                <p>Add and view your furry friends.</p>
            </div>
            <button class="btn btn-primary" onclick="document.getElementById('addForm').style.display='block'"><i class="fas fa-plus"></i> Add New Pet</button>
        </div>

        <div class="glass-card-static mb-32" id="addForm" style="display:none; max-width:600px;">
            <h3 class="section-title">Add a Pet</h3>
            <form id="petForm">
                <div class="form-group">
                    <label>Pet Name</label>
                    <input type="text" id="p_name" class="form-control" required>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Species (Dog, Cat, etc.)</label>
                        <input type="text" id="p_species" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Breed</label>
                        <input type="text" id="p_breed" class="form-control">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" id="p_dob" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Weight (kg)</label>
                        <input type="number" step="0.1" id="p_weight" class="form-control">
                    </div>
                </div>
                <div style="display:flex; gap:16px;">
                    <button type="submit" class="btn btn-success">Save Pet</button>
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('addForm').style.display='none'">Cancel</button>
                </div>
            </form>
        </div>

        <div class="grid-3" id="pet-cards"></div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        function loadPets() {
            const list = document.getElementById('pet-cards');
            list.innerHTML = '';
            const pets = Store.getAll('pets');
            
            if (pets.length === 0) list.innerHTML = '<p class="text-muted">No pets found.</p>';
            
            pets.forEach(p => {
                list.innerHTML += `
                <div class="glass-card pet-card">
                    <div style="font-size:3rem; text-align:center; padding:20px; background:var(--primary-dark); border-radius:var(--radius-md) var(--radius-md) 0 0;">
                        🐾
                    </div>
                    <div style="padding:20px;">
                        <h3 style="margin-bottom:8px;">${p.pet_name}</h3>
                        <p class="text-muted" style="font-size:0.9rem; margin-bottom:16px;">${p.species} • ${p.breed}</p>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:0.85rem;">
                            <div><strong>DOB:</strong> <br> ${p.dob}</div>
                            <div><strong>Weight:</strong> <br> ${p.weight || 'N/A'} kg</div>
                        </div>
                        <button class="btn btn-sm btn-danger" style="margin-top:16px; width:100%;" onclick="deletePet(${p.id})">Delete</button>
                    </div>
                </div>`;
            });
        }

        document.getElementById('petForm').addEventListener('submit', e => {
            e.preventDefault();
            Store.save('pets', {
                pet_name: document.getElementById('p_name').value,
                species: document.getElementById('p_species').value,
                breed: document.getElementById('p_breed').value,
                dob: document.getElementById('p_dob').value,
                weight: document.getElementById('p_weight').value,
            });
            document.getElementById('addForm').style.display = 'none';
            e.target.reset();
            loadPets();
        });

        function deletePet(id) {
            if(confirm("Delete this pet?")) {
                Store.delete('pets', id);
                loadPets();
            }
        }

        loadPets();
    </script>
</body>
</html>
